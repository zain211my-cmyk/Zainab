<html>
<head>
<title>food items</title>
</head>
<style>
body
{
  background-color:#AEC6CF;
}
.section-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

.food-item{
    text-align:center;
}

.food-item img{
    width:250px;
    height:160px;
    object-fit:cover;
    border-radius:8px;
    transition:0.3s;
}

.food-item img:hover{
    transform:scale(1.05);
}

.food-item p{
    margin:3px 0 0;
    font-size:13px;
    font-weight:bold;
}
 h3{
    text-align:center;
}
a
{
text-align:center;
text-decoration: none;
color: black;

}


.order
{
background: linear-gradient(180deg, #FF6B6B 0%, #FFD93D 50%, #FF9F43 100%);
    color: white
margin-top:50px;
border:1px solid black;
border-radius: 10px;
}
</style>
<body>
<h3>🍜 Chinese</h3>
<div class="section-grid">
<div class="food-item">
<img src="noodles.jpg" onclick="window.open('https://en.wikipedia.org/wiki/Chow_mein','_blank')">
<p>Noodles</p>
</div>

<div class="food-item">
<img src="momos.jpg" onclick="window.open('https://en.wikipedia.org/wiki/Momo_(food)','_blank')">
<p>Momos</p>
</div>

<div class="food-item">
<img src="manchurian.jpg" onclick="window.open('https://en.wikipedia.org/wiki/Manchurian_(dish)','_blank')">
<p>Manchurian</p>
</div>

<div class="food-item">
<img src="friedrice.jpg" onclick="window.open('https://en.wikipedia.org/wiki/Fried_rice','_blank')">
<p>Fried Rice</p>
</div>

</div>
</div>

<div class="order">
<a href="cform.html">
<p> ORDER NOW<P>
</a>
</div>
<img src="noo.png" width="200px" height="190px" >

</body>
</html>
